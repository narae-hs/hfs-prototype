<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=820">
  <title>홈플래너 시방서 이미지 — 프로토타입</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ─── POPUP ─────────────────────────────────────── */
    .popup {
      width: 770px;
      height: 700px;
      background: #fff;
      border-radius: 2px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      padding: 16px 28px 28px;
      overflow: hidden;
      position: relative;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    .popup-header { flex-shrink: 0; }

    .popup-header-row {
      display: flex;
      align-items: center;
      height: 48px;
      padding: 4px 0;
      gap: 24px;
    }

    .popup-title {
      flex: 1;
      font-size: 24px;
      font-weight: 500;
      color: #121212;
      line-height: 1.4;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      flex-shrink: 0;
      border-radius: 4px;
    }
    .close-btn:hover { background: #f7f7f7; }

    .header-divider {
      height: 2px;
      background: #121212;
      margin-top: 8px;
    }

    /* ─── BODY ─────────────────────────────────────── */
    .popup-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Spec List Area ── */
    .spec-list-area {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      transition: max-height 0.3s ease, padding-top 0.3s ease, opacity 0.2s ease;
    }

    /* compact mode after radio selected */
    .popup-body.radio-selected .spec-list-area {
      flex: none;
      max-height: 152px;
    }

    /* collapsed: hide spec list (via touchArea click) */
    .popup-body.spec-collapsed .spec-list-area {
      max-height: 0 !important;
      padding-top: 0;
      opacity: 0;
    }

    .spec-desc {
      display: block;
      font-size: 14px;
      color: #666;
      line-height: 1.4;
      flex-shrink: 0;
    }

    .spec-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      padding-bottom: 20px;
    }

    .spec-list-row {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .spec-list-divider {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: #efefef;
    }

    /* ── Controls Group ── */
    .controls-group {
      flex: 1;
      min-width: 0;
      min-height: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .controls-group:hover .radio-circle { border-color: #888; }

    /* ── Radio Button ── */
    .radio-btn {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      position: relative;
    }

    .radio-circle {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      border: 1.5px solid #c8c8c8;
      background: #fff;
      transition: border-color 0.15s;
    }

    .radio-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #121212;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .radio-btn.selected .radio-circle { border-color: #121212; }
    .radio-btn.selected .radio-dot   { opacity: 1; }

    .label-text {
      font-size: 14px;
      color: #121212;
      line-height: 20px;
      white-space: nowrap;
    }

    .label-divider {
      width: 1px;
      height: 12px;
      background: #e2e2e2;
      flex-shrink: 0;
    }

    /* ── Touch Area ── */
    .touch-area {
      flex-shrink: 0;
      display: none;
      align-items: center;
      justify-content: center;
      height: 32px;
      cursor: pointer;
    }
    .popup-body.radio-selected .touch-area { display: flex; }

    .touch-icon svg {
      display: block;
      transform: rotate(180deg); /* ∧ up = list visible */
      transition: transform 0.25s ease;
    }
    .popup-body.spec-collapsed .touch-icon svg { transform: rotate(0deg); } /* ∨ down = list hidden */

    /* ── Img Area ── */
    .img-area {
      flex: 1;
      min-height: 0;
      display: none;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      padding-top: 20px;
      padding-bottom: 28px;
    }
    .popup-body.radio-selected .img-area { display: flex; }

    .img-area-desc {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #666;
      line-height: 1.4;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .img-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .img-row { display: flex; gap: 8px; }

    /* ── Thumb ── */
    .thumb {
      width: 95px;
      height: 95px;
      flex-shrink: 0;
      position: relative;
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      padding: 4px;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }

    .thumb.selected {
      border-color: #121212;
    }

    .thumb-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 2px;
      pointer-events: none;
    }

    /* dark overlay — only on selected */
    .thumb-overlay {
      position: absolute;
      inset: 0;
      border-radius: 2px;
      background: rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    .thumb.selected .thumb-overlay { opacity: 1; }

    /* fallback gradient when image fails to load */
    .thumb-bg-fallback {
      position: absolute;
      inset: 0;
      border-radius: 2px;
      background: linear-gradient(135deg, #d8e4d8, #b8ccb8);
      pointer-events: none;
    }

    .thumb-checkbox {
      position: relative;
      z-index: 1;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    /* default: white semi-transparent fill + gray border */
    .cb-rect {
      position: absolute;
      left: 2px;
      top: 2px;
      width: 20px;
      height: 20px;
      border-radius: 2px;
    }

    /* default checkbox images */
    .cb-rect-default {
      display: block;
    }
    .cb-rect-selected {
      display: none;
    }
    .thumb.selected .cb-rect-default { display: none; }
    .thumb.selected .cb-rect-selected { display: block; }

    /* icon wrapper: 16×16 at left:4 top:4 */
    .cb-icon-wrap {
      position: absolute;
      left: 4px;
      top: 4px;
      width: 16px;
      height: 16px;
      pointer-events: none;
      display: none;
    }
    .thumb.selected .cb-icon-wrap { display: block; }

    /* icon inner div: exact Figma inset percentages */
    .cb-icon-inner {
      position: absolute;
      top: 26.25%;
      right: 13.75%;
      bottom: 27.26%;
      left: 13.75%;
    }
    .cb-icon-inner img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      max-width: none;
    }

    /* ─── FOOTER ─────────────────────────────────────── */
    .popup-footer {
      flex-shrink: 0;
      display: none;
      justify-content: center;
      padding-top: 24px;
    }
    #popupBody.radio-selected + .popup-footer { display: flex; }

    .content-btn {
      width: 290px;
      height: 48px;
      border-radius: 30px;
      border: none;
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      font-weight: 400;
      cursor: not-allowed;
      background: #f7f7f7;
      color: #b3b3b3;
      transition: background 0.2s, color 0.2s;
    }

    .content-btn.enabled {
      background: #121212;
      color: #fff;
      cursor: pointer;
    }
    .content-btn.enabled:hover { background: #333; }

    /* ─── TOAST ─────────────────────────────────────── */
    .toast {
      position: absolute;
      /* 28px popup-pb + 48px button + 24px gap above button */
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      width: 680px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      font-weight: 500;
      padding: 12px 24px;
      border-radius: 4px;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
      letter-spacing: 0;
      line-height: 22.4px;
    }
    .toast.show { opacity: 1; }

    /* ─── UPLOAD POPUP ───────────────────────────────── */
    #uploadPopup {
      width: 370px;
      height: 337px;
    }

    .upload-content-area {
      flex: 1;
      background: #fff;
      min-height: 0;
    }

    .upload-buttons {
      position: absolute;
      left: 26px;
      top: 74px;
      width: 316px;
      height: 236px;
      padding: 62px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      pointer-events: none;
    }

    .upload-btn {
      width: 191px;
      height: 48px;
      flex-shrink: 0;
      border: 1px solid #e2e2e2;
      border-radius: 1000px;
      background: #fff;
      color: #121212;
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
      cursor: pointer;
      padding: 14px 24px;
      white-space: nowrap;
      pointer-events: auto;
      transition: background 0.15s;
    }
    .upload-btn:hover { background: #f7f7f7; }

    /* ─── ALERT OVERLAY ──────────────────────────────── */
    .alert-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .alert-overlay.show { display: flex; }

    .alert-box {
      background: #fff;
      border-radius: 2px;
      padding: 40px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }

    .alert-text {
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: #121212;
      text-align: center;
      line-height: 1.4;
      letter-spacing: 0;
    }

    .alert-confirm-btn {
      width: 100%;
      height: 48px;
      background: #121212;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-family: 'Pretendard', sans-serif;
      font-size: 16px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.15s;
    }
    .alert-confirm-btn:hover { background: #333; }
  </style>
</head>
<body>

<!-- ── 초기 화면: 이미지 업로드 ── -->
<div class="popup" id="uploadPopup">
  <div class="popup-header">
    <div class="popup-header-row">
      <div class="popup-title">이미지 업로드</div>
      <button class="close-btn" id="uploadCloseBtn" title="닫기">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
             stroke="#121212" stroke-width="1.5" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"/>
          <line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="header-divider"></div>
  </div>
  <div class="upload-content-area"></div>
  <div class="upload-buttons">
    <button class="upload-btn" id="pcImportBtn">PC에서 가져오기</button>
    <button class="upload-btn" id="hpImportBtn">홈플래너에서 가져오기</button>
  </div>
</div>

<!-- ── PC에서 가져오기 알럿 ── -->
<div class="alert-overlay" id="alertOverlay">
  <div class="alert-box">
    <p class="alert-text">견적서에 홈플래너 설계가 없습니다.</p>
    <button class="alert-confirm-btn" id="alertConfirmBtn">확인</button>
  </div>
</div>

<!-- ── 메인 팝업: 홈플래너 시방서 이미지 ── -->
<div class="popup" id="mainPopup" style="display:none">

  <!-- ── HEADER ── -->
  <div class="popup-header">
    <div class="popup-header-row">
      <div class="popup-title">홈플래너 시방서 이미지</div>
      <button class="close-btn" id="closeBtn" title="닫기">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
             stroke="#121212" stroke-width="1.5" stroke-linecap="round">
          <line x1="6" y1="6" x2="18" y2="18"/>
          <line x1="18" y1="6" x2="6" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="header-divider"></div>
  </div>

  <!-- ── BODY ── -->
  <div class="popup-body radio-selected" id="popupBody">

    <!-- Spec List Area -->
    <div class="spec-list-area" id="specListArea">
      <div class="spec-desc">
        홈플래너 견적서가 속한 대표 설계에 첨부된 시방서 입니다.
      </div>
      <div class="spec-list" id="specList"></div>
      <div class="spec-list-divider"></div>
    </div>

    <!-- Touch Area -->
    <div class="touch-area" id="touchArea">
      <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;padding:4px;">
        <div class="touch-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="#121212" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="5,9 12,15 19,9"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Img Area -->
    <div class="img-area" id="imgArea">
      <div class="img-area-desc">
        <span>첨부할 이미지를 선택하세요.</span>
      </div>
      <div class="img-grid" id="imgGrid"></div>
    </div>

  </div><!-- /popup-body -->

  <!-- ── FOOTER ── -->
  <div class="popup-footer">
    <button class="content-btn" id="contentBtn" disabled>상담에 담기 <span id="btnCount">(0/10)</span></button>
  </div>

  <!-- Toast (팝업 내부, 버튼 상단 24px 위) -->
  <div class="toast" id="toast">이미지는 최대 10개까지 선택할 수 있습니다.</div>

</div><!-- /popup -->

<script>
  /* ── Data ── */
  const LIST_ITEMS = [
    { code: 'D10041', name: '마포 성암로 A타입' },
    { code: 'D10041', name: '키친 스탠다드' },
    { code: 'D10041', name: '마포 성암로 B타입' },
    { code: 'D10041', name: '엘리시움 타워 35평형' },
    { code: 'D10041', name: '에코 포레스트 힐링 1차' },
    { code: 'D10041', name: '엘리시움 타워 45평형' },
    { code: 'D10041', name: '에코 포레스트 힐링 2차' },
    { code: 'D10041', name: '엘리시움 타워 54평형' },
    { code: 'D10041', name: '에코 포레스트 스탠다드 견적' },
  ];

  const THUMB_IMG     = 'https://www.figma.com/api/mcp/asset/d89da72d-7805-47c2-91f3-60e79a05b57b';
  const CB_RECT_DEF   = 'https://www.figma.com/api/mcp/asset/d1871e8e-0042-46e5-ad61-789ede183481';
  const CB_STROKE_DEF = 'https://www.figma.com/api/mcp/asset/14449c72-7512-4fa1-b45e-8597be5643cc';
  const CB_RECT_SEL   = 'https://www.figma.com/api/mcp/asset/b41752aa-acc9-4f6c-9262-73e6bbda5586';
  const CB_ICON_SEL   = 'https://www.figma.com/api/mcp/asset/7a833136-f1da-4de6-89a6-dd3c1077af85';
  const THUMB_ROWS = 7;
  const THUMB_COLS = 7;

  /* ── State ── */
  let selectedRadioIndex = null;
  let selectedThumbs = new Set();
  let toastTimer = null;

  const body      = document.getElementById('popupBody');
  const btnCount  = document.getElementById('btnCount');
  const contentBtn= document.getElementById('contentBtn');
  const toast     = document.getElementById('toast');

  /* ── Build spec list ── */
  (function buildList() {
    const list = document.getElementById('specList');
    for (let i = 0; i < LIST_ITEMS.length; i += 2) {
      const row = document.createElement('div');
      row.className = 'spec-list-row';
      for (let j = i; j < Math.min(i + 2, LIST_ITEMS.length); j++) {
        row.appendChild(makeControlsGroup(j, LIST_ITEMS[j]));
      }
      list.appendChild(row);
    }
    /* default: select first item */
    selectedRadioIndex = 0;
    document.getElementById('rb-0').classList.add('selected');
  })();

  function makeControlsGroup(idx, item) {
    const g = document.createElement('div');
    g.className = 'controls-group';

    const rb = document.createElement('div');
    rb.className = 'radio-btn';
    rb.id = 'rb-' + idx;
    rb.innerHTML = '<div class="radio-circle"></div><div class="radio-dot"></div>';

    const t1 = document.createElement('div');
    t1.className = 'label-text';
    t1.textContent = item.code;

    const div = document.createElement('div');
    div.className = 'label-divider';

    const t2 = document.createElement('div');
    t2.className = 'label-text';
    t2.textContent = item.name;

    g.append(rb, t1, div, t2);
    g.addEventListener('click', () => selectRadio(idx));
    return g;
  }

  /* ── Build thumbs ── */
  (function buildThumbs() {
    const grid = document.getElementById('imgGrid');
    for (let r = 0; r < THUMB_ROWS; r++) {
      const row = document.createElement('div');
      row.className = 'img-row';
      for (let c = 0; c < THUMB_COLS; c++) {
        row.appendChild(makeThumb(r * THUMB_COLS + c));
      }
      grid.appendChild(row);
    }
  })();

  function makeThumb(idx) {
    const t = document.createElement('div');
    t.className = 'thumb';
    t.dataset.idx = idx;

    /* fallback bg */
    const fallback = document.createElement('div');
    fallback.className = 'thumb-bg-fallback';

    /* image */
    const img = document.createElement('img');
    img.className = 'thumb-bg';
    img.alt = '';
    img.src = THUMB_IMG;
    img.onerror = () => img.style.display = 'none';

    /* dark overlay (selected only) */
    const overlay = document.createElement('div');
    overlay.className = 'thumb-overlay';

    /* checkbox wrapper */
    const cb = document.createElement('div');
    cb.className = 'thumb-checkbox';

    /* default state: white fill + gray stroke */
    const rectDef = document.createElement('img');
    rectDef.className = 'cb-rect cb-rect-default';
    rectDef.src = CB_RECT_DEF;
    rectDef.alt = '';

    const strokeDef = document.createElement('img');
    strokeDef.className = 'cb-rect cb-rect-default';
    strokeDef.src = CB_STROKE_DEF;
    strokeDef.alt = '';

    /* selected state: dark filled rect */
    const rectSel = document.createElement('img');
    rectSel.className = 'cb-rect cb-rect-selected';
    rectSel.src = CB_RECT_SEL;
    rectSel.alt = '';
    rectSel.style.left = '50%';
    rectSel.style.top = '50%';
    rectSel.style.transform = 'translate(-50%,-50%)';

    /* selected checkmark icon */
    const iconWrap = document.createElement('div');
    iconWrap.className = 'cb-icon-wrap';
    const iconInner = document.createElement('div');
    iconInner.className = 'cb-icon-inner';
    const iconImg = document.createElement('img');
    iconImg.src = CB_ICON_SEL;
    iconImg.alt = '';
    iconInner.appendChild(iconImg);
    iconWrap.appendChild(iconInner);

    cb.append(rectDef, strokeDef, rectSel, iconWrap);
    t.append(fallback, img, overlay, cb);
    t.addEventListener('click', () => toggleThumb(idx));
    return t;
  }

  /* ── Interactions ── */

  function selectRadio(idx) {
    if (selectedRadioIndex === idx) return;
    if (selectedRadioIndex !== null) {
      document.getElementById('rb-' + selectedRadioIndex)?.classList.remove('selected');
    }
    selectedRadioIndex = idx;
    document.getElementById('rb-' + idx)?.classList.add('selected');

    /* reset thumbnails for new spec */
    selectedThumbs.clear();
    document.querySelectorAll('.thumb.selected').forEach(el => el.classList.remove('selected'));
    updateCount();
    updateBtn();

    body.classList.add('radio-selected');
    body.classList.remove('spec-collapsed');
  }

  document.getElementById('touchArea').addEventListener('click', () => {
    body.classList.toggle('spec-collapsed');
  });

  function toggleThumb(idx) {
    const el = document.querySelector(`.thumb[data-idx="${idx}"]`);
    if (selectedThumbs.has(idx)) {
      selectedThumbs.delete(idx);
      el.classList.remove('selected');
    } else {
      if (selectedThumbs.size >= 10) {
        showToast('이미지는 최대 10개까지 선택할 수 있습니다.');
        return;
      }
      selectedThumbs.add(idx);
      el.classList.add('selected');
    }
    updateCount();
    updateBtn();
  }

  function updateCount() {
    btnCount.textContent = `(${selectedThumbs.size}/10)`;
  }

  function updateBtn() {
    if (selectedThumbs.size > 0) {
      contentBtn.classList.add('enabled');
      contentBtn.disabled = false;
    } else {
      contentBtn.classList.remove('enabled');
      contentBtn.disabled = true;
    }
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1200);
  }

  contentBtn.addEventListener('click', () => {
    if (!contentBtn.classList.contains('enabled')) return;
    showToast('홈플래너 시방서 이미지가 등록되었습니다.');
    setTimeout(() => resetPopup(), 1200);
  });

  document.getElementById('closeBtn').addEventListener('click', resetPopup);

  /* ── 업로드 팝업 ── */
  document.getElementById('uploadCloseBtn').addEventListener('click', () => {
    document.getElementById('uploadPopup').style.display = 'none';
  });

  document.getElementById('hpImportBtn').addEventListener('click', () => {
    document.getElementById('uploadPopup').style.display = 'none';
    document.getElementById('mainPopup').style.display = 'flex';
  });

  document.getElementById('pcImportBtn').addEventListener('click', () => {
    document.getElementById('alertOverlay').classList.add('show');
  });

  document.getElementById('alertConfirmBtn').addEventListener('click', () => {
    document.getElementById('alertOverlay').classList.remove('show');
  });

  /* ── Fit to viewport ── */
  (function fitToViewport() {
    const DESIGN_W = 820;
    function applyZoom() {
      const s = Math.min(window.innerWidth / DESIGN_W, 1);
      document.documentElement.style.zoom = s < 1 ? s : '';
    }
    applyZoom();
    window.addEventListener('resize', applyZoom);
  })();

  function resetPopup() {
    selectedRadioIndex = null;
    selectedThumbs.clear();

    document.querySelectorAll('.radio-btn.selected').forEach(el => el.classList.remove('selected'));
    document.querySelectorAll('.thumb.selected').forEach(el => el.classList.remove('selected'));

    body.classList.remove('spec-collapsed');
    body.classList.add('radio-selected');
    selectedRadioIndex = 0;
    document.getElementById('rb-0').classList.add('selected');
    updateCount();
    updateBtn();

    document.getElementById('mainPopup').style.display = 'none';
    document.getElementById('uploadPopup').style.display = 'flex';
  }
</script>
</body>
</html>
